name: Propelbon Daily Brief

on:
  schedule:
    # 07:00 hora de Madrid (UTC+1 en invierno / UTC+2 en verano)
    # GitHub Actions usa UTC — ajustar según la época del año:
    # Verano (CEST, UTC+2): lanzar a las 06:00 UTC = 08:00 Madrid
    - cron: '0 6 * * 1-5'   # lunes a viernes
  workflow_dispatch:          # permite lanzarlo manualmente desde GitHub

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar briefing
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID:   ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          TAVILY_API_KEY:     ${{ secrets.TAVILY_API_KEY }}
        run: python briefing.py
